<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>BN SPARK | Premium Cyber OTT Platform</title>
    
    <!-- Premium Fonts -->
    <link href="https://fonts.googleapis.com/css2?family=Plus+Jakarta+Sans:wght@300;400;500;600;700;800&family=Space+Grotesk:wght@500;700&display=swap" rel="stylesheet">
    
    <!-- HLS Core Engine -->
    <script src="https://cdn.jsdelivr.net/npm/hls.js@latest"></script>

    <style>
        /* Ultra Premium Cyber Glowing Tokens */
        :root {
            --bg-void: #02040a;
            --bg-glass: rgba(10, 15, 30, 0.6);
            --bg-glass-hover: rgba(20, 30, 55, 0.8);
            --border-glow: rgba(0, 245, 255, 0.15);
            --neon-cyan: #00f5ff;
            --neon-magenta: #ff007f;
            --neon-gold: #ffcc00;
            --text-pure: #ffffff;
            --text-cyan: #b3f9ff;
            --text-dim: #62728f;
            --glass-blur: blur(25px);
        }

        * {
            box-sizing: border-box;
            margin: 0;
            padding: 0;
            font-family: 'Plus Jakarta Sans', sans-serif;
            -webkit-tap-highlight-color: transparent;
        }

        body {
            background-color: var(--bg-void);
            color: var(--text-pure);
            background-image: 
                radial-gradient(circle at 50% -20%, rgba(0, 245, 255, 0.12), transparent 50%),
                radial-gradient(circle at 10% 60%, rgba(255, 0, 127, 0.05), transparent 40%),
                radial-gradient(circle at 90% 80%, rgba(255, 204, 0, 0.04), transparent 40%);
            background-attachment: fixed;
            min-height: 100vh;
            padding-bottom: 80px;
            overflow-x: hidden;
        }

        /* Custom Sleek Scrollbar */
        ::-webkit-scrollbar { width: 8px; height: 8px; }
        ::-webkit-scrollbar-track { background: var(--bg-void); }
        ::-webkit-scrollbar-thumb { background: rgba(0, 245, 255, 0.2); border-radius: 20px; }
        ::-webkit-scrollbar-thumb:hover { background: var(--neon-cyan); box-shadow: 0 0 10px var(--neon-cyan); }

        .container {
            max-width: 1440px;
            margin: 0 auto;
            padding: 0 40px;
        }

        /* Sci-Fi Premium Navbar */
        header {
            background: rgba(2, 4, 10, 0.7);
            backdrop-filter: var(--glass-blur);
            -webkit-backdrop-filter: var(--glass-blur);
            border-bottom: 1px solid rgba(0, 245, 255, 0.08);
            position: sticky;
            top: 0;
            z-index: 1000;
            padding: 20px 0;
            box-shadow: 0 10px 30px rgba(0,0,0,0.5);
        }

        .nav-wrapper {
            display: flex;
            justify-content: space-between;
            align-items: center;
        }

        .brand-logo {
            font-family: 'Space Grotesk', sans-serif;
            font-size: 2rem;
            font-weight: 700;
            letter-spacing: -1px;
            color: #fff;
            text-decoration: none;
            display: flex;
            align-items: center;
            gap: 4px;
            text-shadow: 0 0 20px rgba(255, 255, 255, 0.2);
        }

        .brand-logo span {
            color: var(--neon-cyan);
            text-shadow: 0 0 20px rgba(0, 245, 255, 0.6);
        }

        .live-hud-badge {
            background: rgba(255, 0, 127, 0.05);
            border: 1px solid rgba(255, 0, 127, 0.3);
            color: var(--neon-magenta);
            padding: 8px 18px;
            border-radius: 8px;
            font-size: 0.8rem;
            font-weight: 800;
            letter-spacing: 1px;
            display: flex;
            align-items: center;
            gap: 10px;
            text-transform: uppercase;
            box-shadow: 0 0 15px rgba(255, 0, 127, 0.15);
        }

        .pulse-core {
            width: 8px;
            height: 8px;
            background: var(--neon-magenta);
            border-radius: 50%;
            box-shadow: 0 0 12px var(--neon-magenta);
            animation: core-glow 1.5s infinite;
        }

        @keyframes core-glow {
            0% { transform: scale(0.9); opacity: 0.6; box-shadow: 0 0 0 0 rgba(255, 0, 127, 0.7); }
            50% { transform: scale(1.1); opacity: 1; box-shadow: 0 0 15px 4px rgba(255, 0, 127, 0.4); }
            100% { transform: scale(0.9); opacity: 0.6; box-shadow: 0 0 0 0 rgba(255, 0, 127, 0.7); }
        }

        /* Cinema Interactive Stage */
        .stage-grid {
            display: grid;
            grid-template-columns: 2.7fr 1.3fr;
            gap: 35px;
            margin: 50px 0;
        }

        .theater-box {
            background: #000;
            border-radius: 24px;
            overflow: hidden;
            border: 1px solid rgba(0, 245, 255, 0.15);
            box-shadow: 0 30px 60px -15px rgba(0, 245, 255, 0.08), 0 0 40px rgba(0,0,0,0.9) inset;
            aspect-ratio: 16/9;
            position: relative;
        }

        video { width: 100%; height: 100%; object-fit: cover; }

        /* Premium Glass Console */
        .glass-console {
            background: var(--bg-glass);
            backdrop-filter: var(--glass-blur);
            -webkit-backdrop-filter: var(--glass-blur);
            border: 1px solid rgba(255, 255, 255, 0.05);
            border-radius: 24px;
            padding: 35px;
            display: flex;
            flex-direction: column;
            justify-content: space-between;
            box-shadow: 0 20px 50px rgba(0,0,0,0.4);
            position: relative;
            overflow: hidden;
        }

        .glass-console::before {
            content: '';
            position: absolute;
            top: 0; left: 0; width: 100%; height: 4px;
            background: linear-gradient(90deg, var(--neon-cyan), var(--neon-magenta));
        }

        .badge-system {
            display: inline-flex;
            align-items: center;
            gap: 6px;
            background: rgba(0, 245, 255, 0.05);
            border: 1px solid rgba(0, 245, 255, 0.2);
            padding: 6px 14px;
            border-radius: 6px;
            font-size: 0.75rem;
            font-weight: 700;
            text-transform: uppercase;
            letter-spacing: 1.5px;
            color: var(--text-cyan);
            margin-bottom: 25px;
        }

        .badge-system.gold-variant {
            color: var(--neon-gold);
            background: rgba(255, 204, 0, 0.05);
            border-color: rgba(255, 204, 0, 0.25);
            box-shadow: 0 0 10px rgba(255, 204, 0, 0.1);
        }

        .console-title {
            font-size: 2.2rem;
            font-weight: 800;
            line-height: 1.2;
            letter-spacing: -0.5px;
            margin-bottom: 30px;
            background: linear-gradient(135deg, #fff 60%, var(--text-dim));
            -webkit-background-clip: text;
            -webkit-text-fill-color: transparent;
        }

        .telemetry-dashboard {
            background: rgba(5, 8, 18, 0.6);
            border: 1px solid rgba(255, 255, 255, 0.03);
            border-radius: 16px;
            padding: 24px;
            margin-bottom: 30px;
        }

        .telemetry-node {
            display: flex;
            justify-content: space-between;
            align-items: center;
            padding-bottom: 14px;
            margin-bottom: 14px;
            border-bottom: 1px solid rgba(255,255,255,0.04);
            font-size: 0.9rem;
            color: var(--text-dim);
        }
        .telemetry-node:last-child { border: none; margin: 0; padding: 0; }
        .telemetry-data-val { color: #fff; font-weight: 600; }
        .telemetry-data-val.glow-count { 
            color: var(--neon-cyan); 
            text-shadow: 0 0 10px rgba(0, 245, 255, 0.4); 
        }

        /* Glowing Action Button */
        .btn-glow-action {
            background: linear-gradient(90deg, var(--neon-cyan), #00b5ff);
            color: var(--bg-void);
            border: none;
            padding: 18px;
            border-radius: 14px;
            font-size: 1rem;
            font-weight: 700;
            letter-spacing: 0.5px;
            cursor: pointer;
            display: flex;
            justify-content: center;
            align-items: center;
            gap: 10px;
            box-shadow: 0 0 25px rgba(0, 245, 255, 0.3);
            transition: all 0.3s cubic-bezier(0.175, 0.885, 0.32, 1.275);
        }
        .btn-glow-action:hover {
            transform: translateY(-3px);
            box-shadow: 0 0 35px rgba(0, 245, 255, 0.5);
            background: linear-gradient(90deg, #00f5ff, #ff007f);
            color: #fff;
        }

        /* Futuristic Category Slider */
        .matrix-slider {
            display: flex;
            gap: 15px;
            overflow-x: auto;
            padding-bottom: 15px;
            margin-bottom: 45px;
            border-bottom: 1px solid rgba(255,255,255,0.05);
            scrollbar-width: none;
        }

        .slider-node {
            background: var(--bg-glass);
            border: 1px solid rgba(255, 255, 255, 0.03);
            color: var(--text-dim);
            padding: 14px 28px;
            border-radius: 12px;
            font-size: 0.9rem;
            font-weight: 600;
            cursor: pointer;
            white-space: nowrap;
            transition: all 0.25s ease;
        }

        .slider-node:hover, .slider-node.active {
            background: var(--bg-glass-hover);
            color: #fff;
            border-color: var(--neon-cyan);
            box-shadow: 0 0 15px rgba(0, 245, 255, 0.15);
        }

        .slider-node.gold-node {
            border-color: rgba(255, 204, 0, 0.2);
            color: var(--neon-gold);
        }
        .slider-node.gold-node:hover, .slider-node.gold-node.active {
            border-color: var(--neon-gold);
            box-shadow: 0 0 15px rgba(255, 204, 0, 0.2);
            color: #fff;
        }

        /* Premium Glowing Grid Grid Layout */
        .section-headline {
            font-family: 'Space Grotesk', sans-serif;
            font-size: 1.6rem;
            margin-bottom: 30px;
            letter-spacing: -0.5px;
            display: flex;
            align-items: center;
            gap: 12px;
        }

        .grid-matrix {
            display: grid;
            grid-template-columns: repeat(auto-fill, minmax(380px, 1fr));
            gap: 30px;
        }

        .matrix-card {
            background: var(--bg-glass);
            border: 1px solid rgba(255, 255, 255, 0.04);
            border-radius: 20px;
            padding: 28px;
            cursor: pointer;
            position: relative;
            transition: all 0.3s cubic-bezier(0.25, 0.8, 0.25, 1);
            overflow: hidden;
        }

        .matrix-card::after {
            content: '';
            position: absolute;
            top: 0; left: 0; width: 100%; height: 100%;
            border-radius: 20px;
            border: 1px solid transparent;
            background: linear-gradient(135deg, var(--neon-cyan), var(--neon-magenta)) border-box;
            -webkit-mask: linear-gradient(#fff 0 0) padding-box, linear-gradient(#fff 0 0);
            -webkit-mask-composite: destination-out;
            mask-composite: exclude;
            opacity: 0;
            transition: opacity 0.3s ease;
        }

        .matrix-card:hover::after { opacity: 1; }

        .matrix-card:hover {
            transform: translateY(-6px);
            background: var(--bg-glass-hover);
            box-shadow: 0 20px 40px rgba(0, 0, 0, 0.6), 0 0 20px rgba(0, 245, 255, 0.05);
        }

        .matrix-card.selected-stream {
            border-color: var(--neon-cyan);
            background: rgba(0, 245, 255, 0.02);
            box-shadow: 0 0 25px rgba(0, 245, 255, 0.1);
        }

        .card-meta-row {
            display: flex;
            justify-content: space-between;
            align-items: center;
            margin-bottom: 22px;
        }

        .card-main-title {
            font-size: 1.4rem;
            font-weight: 700;
            line-height: 1.3;
            margin-bottom: 15px;
            color: #fff;
        }

        .card-timestamp {
            font-size: 0.9rem;
            color: var(--text-dim);
            font-weight: 500;
        }

        .card-boundary {
            margin-top: 25px;
            padding-top: 18px;
            border-top: 1px solid rgba(255,255,255,0.04);
            display: flex;
            justify-content: space-between;
            align-items: center;
        }

        .live-status-text {
            font-size: 0.85rem;
            font-weight: 700;
            display: flex;
            align-items: center;
            gap: 6px;
        }

        .action-indicator-arrow {
            font-size: 0.9rem;
            font-weight: 800;
            color: var(--neon-cyan);
            text-shadow: 0 0 10px rgba(0, 245, 255, 0.4);
        }

        /* Responsive Flow Configuration */
        @media (max-width: 1150px) {
            .stage-grid { grid-template-columns: 1fr; gap: 25px; }
        }
        @media (max-width: 650px) {
            .container { padding: 0 20px; }
            .console-title { font-size: 1.8rem; }
            .grid-matrix { grid-template-columns: 1fr; }
        }
    </style>
</head>
<body>

    <!-- Glowing Top Header Stack -->
    <header>
        <div class="container nav-wrapper">
            <a href="#" class="brand-logo">BN<span>SPARK</span></a>
            <div class="live-hud-badge">
                <div class="pulse-core"></div>
                Ultra Stream Core
            </div>
        </div>
    </header>

    <div class="container">
        <!-- Main Streaming Theater Stage -->
        <section class="stage-grid">
            <div class="theater-box">
                <video id="sparkHlsEngine" controls autoplay playsinline></video>
            </div>

            <div class="glass-console">
                <div>
                    <div id="panelBadge" class="badge-system">Loading Arena</div>
                    <h1 id="panelTitle" class="console-title">Syncing Network Stream Matrix...</h1>
                </div>

                <div>
                    <div class="telemetry-dashboard">
                        <div class="telemetry-node">
                            <span>Decoder Pipeline</span>
                            <span id="panelStatus" class="telemetry-data-val" style="color: var(--neon-cyan);">Active Connection</span>
                        </div>
                        <div class="telemetry-node">
                            <span>Concurrent Core Viewers</span>
                            <span id="panelViewers" class="telemetry-data-val glow-count">0</span>
                        </div>
                        <div class="telemetry-node">
                            <span>Stream Node Matrix</span>
                            <span class="telemetry-data-val" style="color: #fff;">4K Ultra HDR / 60fps</span>
                        </div>
                    </div>
                    <button class="btn-glow-action" onclick="navigator.clipboard.writeText(window.location.href); alert('Secure Share Link Copied!')">
                        🔗 Teleport Share Link
                    </button>
                </div>
            </div>
        </section>

        <!-- Dynamic Category Navigation Node Slider -->
        <div class="matrix-slider">
            <div class="slider-node active" onclick="refreshGridTopology('all', this)">All Nodes</div>
            <div class="slider-node gold-node" onclick="refreshGridTopology('FIFA World Cup', this)">🏆 FIFA World Cup 2026</div>
            <div class="slider-node" onclick="refreshGridTopology('Premier League', this)">Premier League</div>
            <div class="slider-node" onclick="refreshGridTopology('Champions League', this)">UEFA Champions League</div>
        </div>

        <!-- Dynamic Grid Matrix Architecture -->
        <h2 class="section-headline">
            <span style="width: 6px; height: 18px; background: var(--neon-cyan); display: inline-block; box-shadow: 0 0 10px var(--neon-cyan); border-radius: 4px;"></span>
            Broadcast Schedule Matrix
        </h2>
        <div class="grid-matrix" id="dynamicGridTarget">
            <!-- Rendered On-Demand via Component Compiler -->
        </div>
    </div>

    <!-- Application Architecture Script Platform -->
    <script>
        // High fidelity FIFA World Cup 2026 & Live Match Dataset
        const matchDataMatrix = [
            {
                id: "M-NODE-001",
                title: "USA vs Italy",
                league: "FIFA World Cup",
                isLive: true,
                streamUrl: "https://premierleagpl23.akamaized.net/hls/live/2107108/tapmad-P2s6L_FiN@L-UrU/master.m3u8",
                timeLabel: "LIVE NOW - Group Stage Arena",
                viewerStat: "2.4M Active",
                accentTheme: "var(--neon-cyan)"
            },
            {
                id: "M-NODE-002",
                title: "Argentina vs Morocco",
                league: "FIFA World Cup",
                isLive: false,
                streamUrl: "", 
                timeLabel: "June 16, 2026 - 18:00 UTC",
                viewerStat: "Standby Hub",
                accentTheme: "var(--neon-gold)"
            },
            {
                id: "M-NODE-003",
                title: "Mexico vs Portugal",
                league: "FIFA World Cup",
                isLive: false,
                streamUrl: "",
                timeLabel: "June 17, 2026 - 21:00 UTC",
                viewerStat: "Standby Hub",
                accentTheme: "var(--neon-gold)"
            },
            {
                id: "M-NODE-004",
                title: "Brazil vs South Korea",
                league: "FIFA World Cup",
                isLive: false,
                streamUrl: "",
                timeLabel: "June 18, 2026 - 15:00 UTC",
                viewerStat: "Standby Hub",
                accentTheme: "var(--neon-gold)"
            },
            {
                id: "M-NODE-005",
                title: "Arsenal vs Real Madrid",
                league: "Champions League",
                isLive: false,
                streamUrl: "",
                timeLabel: "Archive - VOD Match",
                viewerStat: "Offline",
                accentTheme: "var(--neon-magenta)"
            }
        ];

        let activeHlsInstance = null;
        let globalSelectedNode = matchDataMatrix[0];

        // Advanced Resilient HLS Playback Core Loop
        function runHlsDecoderStream(targetUrl) {
            const videoObject = document.getElementById('sparkHlsEngine');
            
            if (activeHlsInstance) {
                activeHlsInstance.destroy();
            }

            if (!targetUrl) {
                document.getElementById('panelStatus').innerText = "Signal Standby / Unscheduled";
                document.getElementById('panelStatus').style.color = "var(--text-dim)";
                return;
            }

            if (Hls.isSupported()) {
                activeHlsInstance = new Hls({
                    maxBufferLength: 20,
                    liveSyncDurationCount: 2.5,
                    enableWorker: true,
                    lowLatencyMode: true
                });
                activeHlsInstance.loadSource(targetUrl);
                activeHlsInstance.attachMedia(videoObject);
                
                activeHlsInstance.on(Hls.Events.MANIFEST_PARSED, () => {
                    videoObject.play().catch(() => console.log("Engine interactive standby initialized."));
                });

                activeHlsInstance.on(Hls.Events.ERROR, (event, data) => {
                    if (data.fatal) {
                        if (data.type === Hls.ErrorTypes.NETWORK_ERROR) {
                            activeHlsInstance.recoverMediaError();
                        } else {
                            runHlsDecoderStream(targetUrl);
                        }
                    }
                });
            } else if (videoObject.canPlayType('application/vnd.apple.mpegurl')) {
                videoObject.src = targetUrl;
            }
        }

        // Dashboard View Core Synchronizer Component
        function commitHUDUpdate(nodeElement) {
            globalSelectedNode = nodeElement;
            
            const badge = document.getElementById('panelBadge');
            badge.innerText = nodeElement.league;
            
            if(nodeElement.league === "FIFA World Cup") {
                badge.className = "badge-system gold-variant";
            } else {
                badge.className = "badge-system";
            }

            document.getElementById('panelTitle').innerText = nodeElement.title;
            const statusLabel = document.getElementById('panelStatus');
            
            if(nodeElement.isLive) {
                statusLabel.innerText = "Broadcasting Secure Signal";
                statusLabel.style.color = "var(--neon-cyan)";
                statusLabel.style.textShadow = "0 0 10px rgba(0, 245, 255, 0.3)";
                document.getElementById('panelViewers').innerText = nodeElement.viewerStat;
            } else {
                statusLabel.innerText = "Standby Vector Mode";
                statusLabel.style.color = "var(--text-dim)";
                statusLabel.style.textShadow = "none";
                document.getElementById('panelViewers').innerText = "0 (Standby Queue)";
            }

            runHlsDecoderStream(nodeElement.streamUrl);
            window.scrollTo({ top: 0, behavior: 'smooth' });
        }

        // Matrix Rendering Engine Loop Setup
        function processGridArchitecture(filterKey = 'all') {
            const gridContainer = document.getElementById('dynamicGridTarget');
            gridContainer.innerHTML = '';

            const processedSet = filterKey === 'all' 
                ? matchDataMatrix 
                : matchDataMatrix.filter(node => node.league === filterKey);

            processedSet.forEach(node => {
                const isFIFA = node.league === "FIFA World Cup";
                const isLiveInstance = node.isLive;
                const isSelected = node.id === globalSelectedNode.id;
                
                const cardDomElement = document.createElement('div');
                cardDomElement.className = `matrix-card ${isSelected ? 'selected-stream' : ''}`;
                cardDomElement.onclick = () => {
                    commitHUDUpdate(node);
                    processGridArchitecture(filterKey);
                };

                cardDomElement.innerHTML = `
                    <div class="card-meta-row">
                        <span class="badge-system ${isFIFA ? 'gold-variant' : ''}" style="margin:0; padding:4px 12px; font-size:0.65rem;">
                            ${isFIFA ? '🏆 ' : ''}${node.league}
                        </span>
                        <span class="card-timestamp" style="color: ${isLiveInstance ? 'var(--neon-magenta)' : 'var(--text-dim)'}; font-weight: 700;">
                            ${isLiveInstance ? '🔴 LIVE SIGNAL' : 'STANDBY'}
                        </span>
                    </div>
                    <div class="card-main-title">${node.title}</div>
                    <div class="card-timestamp">${node.timeLabel}</div>
                    
                    <div class="card-boundary">
                        <span class="live-status-text" style="color: ${isLiveInstance ? 'var(--neon-cyan)' : 'var(--text-dim)'}; text-shadow: ${isLiveInstance ? '0 0 10px rgba(0,245,255,0.2)' : 'none'}">
                            ${isLiveInstance ? '● Pipeline Stream Active' : '● Signal Inactive'}
                        </span>
                        <span class="action-indicator-arrow">INITIALIZE →</span>
                    </div>
                `;
                gridContainer.appendChild(cardDomElement);
            });
        }

        // Filter Controls Trigger Execution Interface
        window.refreshGridTopology = function(leagueScope, elementRef) {
            document.querySelectorAll('.slider-node').forEach(item => item.classList.remove('active'));
            elementRef.classList.add('active');
            processGridArchitecture(leagueScope);
        };

        // Initialize Native Application Scope Core Pipeline
        window.addEventListener('DOMContentLoaded', () => {
            processGridArchitecture();
            commitHUDUpdate(globalSelectedNode);
        });
    </script>
</body>
</html>
